<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创业者48小时生存实验 | 黑镜式创业模拟</title>
    <meta name="description" content="一场残酷的创业生存实验。你能活过48小时吗？">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css?v=20260320-22">
    <link rel="stylesheet" href="css/animations.css?v=20260319-1">
    <link rel="stylesheet" href="css/preview.css?v=20260320-4">
</head>
<body>
    <!-- 开场动画 -->
    <div id="intro-screen" class="screen active">
        <div class="intro-landing" id="intro-landing">
            <div class="intro-shell">
                <div class="intro-hero">
                    <div class="intro-visual" aria-hidden="true">
                        <div class="intro-visual-glow intro-visual-glow-red"></div>
                        <div class="intro-visual-glow intro-visual-glow-green"></div>
                        <div class="intro-grid"></div>
                        <div class="intro-avatar-shell">
                            <img class="intro-avatar" src="assets/images/Image%202.png" alt="">
                        </div>
                    </div>

                    <div class="intro-copy">
                        <div class="intro-title-lockup">
                            <h1 class="intro-title">
                                <span class="intro-title-line intro-title-time">48小时</span>
                                <span class="intro-title-line intro-title-main">创业生存实验</span>
                            </h1>
                        </div>
                        <p class="intro-kicker">BLACK MIRROR STARTUP SIMULATION</p>
                        <p class="intro-subtitle">现金不多，时间极少。看你还能撑多久🤪</p>
                    </div>
                </div>

                <div class="intro-actions">
                    <button id="click-to-start" class="btn-primary">点击开始</button>
                </div>
            </div>
        </div>

        <div class="intro-sequence hidden" id="intro-sequence">
            <div class="intro-sequence-panel">
                <div class="typewriter-container" id="typewriter-container">
                    <p class="typewriter-text" id="intro-text-1"></p>
                    <p class="typewriter-text" id="intro-text-2"></p>
                    <p class="typewriter-text" id="intro-text-3"></p>
                    <p class="typewriter-text" id="intro-text-4"></p>
                    <p class="typewriter-text" id="intro-text-5"></p>
                    <p class="typewriter-text" id="intro-text-6"></p>
                    <button id="start-btn" class="btn-primary hidden">启动实验</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div id="game-screen" class="screen">
        <!-- 当前小时（顶部） -->
        <div class="hour-display">
            <span class="hour-label">第</span>
            <span class="hour-number" id="current-hour">0</span>
            <span class="hour-label">小时</span>
        </div>

        <!-- 资源条（sticky，吸附顶部） -->
        <div class="resources-panel">
            <div class="resource-item">
                <span class="resource-icon">💰</span>
                <span class="resource-label">资金</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="money-fill"></div>
                </div>
                <span class="resource-value" id="money-value">¥8,000</span>
            </div>

            <div class="resource-item">
                <span class="resource-icon">⏰</span>
                <span class="resource-label">时间</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="time-fill"></div>
                </div>
                <span class="resource-value" id="time-value">48h</span>
            </div>

            <div class="resource-item">
                <span class="resource-icon">⚡</span>
                <span class="resource-label">精力</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="energy-fill"></div>
                </div>
                <span class="resource-value" id="energy-value">100</span>
            </div>

            <div class="resource-item">
                <span class="resource-icon">👥</span>
                <span class="resource-label">人脉</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="network-fill"></div>
                </div>
                <span class="resource-value" id="network-value">5</span>
            </div>
        </div>

        <!-- 主内容区域 -->
        <div class="game-content">
            <div class="story-main">
                <!-- 场景图片 -->
                <div class="scene-frame" id="scene-frame"></div>

                <!-- 剧情内容区 -->
                <div class="story-lower">
                    <div class="story-panel">
                        <h2 class="story-title" id="story-title"></h2>
                        <p class="story-scene" id="story-scene"></p>
                        <div class="story-body" id="story-body">
                            <p class="story-description" id="story-description"></p>

                            <!-- 选择按钮 -->
                            <div class="choices-container" id="choices-container"></div>

                            <!-- 后果显示 -->
                            <div class="consequence-panel hidden" id="consequence-panel">
                                <div class="consequence-card">
                                    <span class="consequence-kicker">SYSTEM FEEDBACK</span>
                                    <p class="consequence-text" id="consequence-text"></p>
                                    <p class="consequence-impact" id="consequence-impact"></p>
                                    <div class="consequence-actions">
                                        <button class="btn-secondary consequence-btn" id="continue-btn">继续</button>
                                    </div>
                                </div>
                            </div>

                            <!-- 黑镜式旁白 -->
                            <p class="black-mirror-text" id="black-mirror-text"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- 结局界面 -->
    <div id="ending-screen" class="screen">
        <div class="ending-content">
            <div class="ending-image-frame" id="ending-image-frame"></div>
            <p class="ending-kicker">本局结论</p>
            <h1 class="ending-title glitch" id="ending-title"></h1>
            <div class="ending-stats">
                <p class="ending-stat">存活时长 <span class="stat-highlight" id="survival-time">0</span> 小时</p>
                <p class="ending-stat">击败 <span class="stat-highlight" id="beat-percentage">0</span>% 玩家</p>
            </div>
            <p class="ending-share-hook" id="ending-share-hook"></p>
            <div class="ending-description" id="ending-description"></div>

            <!-- 资源剩余 -->
            <div class="final-resources">
                <h3>最终状态</h3>
                <p class="final-state-summary" id="final-state-summary"></p>
                <div class="final-resource-grid">
                    <div class="final-resource-item">
                        <span class="resource-icon">💰</span>
                        <span id="final-money">¥0</span>
                    </div>
                    <div class="final-resource-item">
                        <span class="resource-icon">⏰</span>
                        <span id="final-time">0h</span>
                    </div>
                    <div class="final-resource-item">
                        <span class="resource-icon">⚡</span>
                        <span id="final-energy">0</span>
                    </div>
                    <div class="final-resource-item">
                        <span class="resource-icon">👥</span>
                        <span id="final-network">0</span>
                    </div>
                </div>
            </div>

            <!-- 分享按钮 -->
            <div class="ending-actions">
                <button class="btn-primary" id="share-btn">分享结果</button>
                <button class="btn-secondary" id="restart-btn">重新挑战</button>
                <button class="btn-primary" id="contact-btn">测一测：你是否适合创业？</button>
            </div>
        </div>
    </div>

    <div id="ending-transition" class="ending-transition hidden" aria-hidden="true">
        <div class="ending-transition-copy">
            <p class="ending-transition-kicker">SESSION CLOSED</p>
            <p class="ending-transition-text">正在结算你的终局</p>
        </div>
    </div>

    <!-- 分享卡片（隐藏，用于生成图片） -->
    <div id="share-card" class="share-card hidden">
        <h2>创业者48小时生存实验</h2>
        <h3 id="share-ending-title"></h3>
        <p>存活时间: <span id="share-survival-time"></span>小时</p>
        <p>击败了 <span id="share-percentage"></span>% 的玩家</p>
        <p class="share-footer">你能活多久？扫码挑战</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="js/audio.js?v=20260320-2"></script>
    <script src="js/resources.js?v=20260320-1"></script>
    <script src="js/story.js?v=20260319-1"></script>
    <script src="js/endings.js?v=20260319-1"></script>
    <script src="js/game.js?v=20260320-8"></script>
    <script src="js/share.js?v=20260319-1"></script>
</body>
</html>
