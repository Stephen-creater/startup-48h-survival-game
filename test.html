<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏测试工具</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            color: #00ff41;
            margin-bottom: 15px;
        }
        button {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        button:hover {
            background: #00ff41;
            color: #0a0a0a;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 255, 65, 0.1);
            border-left: 3px solid #00ff41;
        }
        .error {
            border-left-color: #ff0040;
            background: rgba(255, 0, 64, 0.1);
            color: #ff0040;
        }
        .success {
            border-left-color: #00ff41;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
        }
        pre {
            background: #000;
            padding: 10px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🎮 创业者48小时生存实验 - 测试工具</h1>

    <div class="test-section">
        <h2>1. 文件检查</h2>
        <button onclick="checkFiles()">检查所有文件</button>
        <div id="file-result"></div>
    </div>

    <div class="test-section">
        <h2>2. 剧情节点测试</h2>
        <button onclick="testStoryNodes()">测试所有节点</button>
        <div id="story-result"></div>
    </div>

    <div class="test-section">
        <h2>3. 结局测试</h2>
        <button onclick="testEnding('broke')">测试破产结局</button>
        <button onclick="testEnding('burnout')">测试崩溃结局</button>
        <button onclick="testEnding('gave_up')">测试放弃结局</button>
        <button onclick="testEnding('survive')">测试生存结局</button>
        <button onclick="testEnding('success')">测试成功结局</button>
        <button onclick="testEnding('no_ethics')">测试不择手段结局</button>
        <div id="ending-result"></div>
    </div>

    <div class="test-section">
        <h2>4. 资源管理测试</h2>
        <button onclick="testResources()">测试资源系统</button>
        <div id="resource-result"></div>
    </div>

    <div class="test-section">
        <h2>5. 数据统计</h2>
        <button onclick="showStatistics()">查看游戏统计</button>
        <button onclick="clearData()">清除所有数据</button>
        <div id="stats-result"></div>
    </div>

    <div class="test-section">
        <h2>6. 快速通关测试</h2>
        <button onclick="quickPlay('broke')">快速破产</button>
        <button onclick="quickPlay('success')">快速成功</button>
        <button onclick="quickPlay('no_ethics')">快速不择手段</button>
        <div id="quickplay-result"></div>
    </div>

    <script src="js/resources.js"></script>
    <script src="js/story.js"></script>
    <script src="js/endings.js"></script>

    <script>
        // 检查文件
        function checkFiles() {
            const result = document.getElementById('file-result');
            const files = [
                'js/resources.js',
                'js/story.js',
                'js/endings.js',
                'js/game.js',
                'js/share.js',
                'css/style.css',
                'css/animations.css'
            ];

            let html = '<div class="result success">文件检查结果：</div>';

            // 检查是否加载了必要的对象
            const checks = [
                { name: 'ResourceManager', exists: typeof ResourceManager !== 'undefined' },
                { name: 'storyNodes', exists: typeof storyNodes !== 'undefined' },
                { name: 'endings', exists: typeof endings !== 'undefined' },
                { name: 'getNode', exists: typeof getNode !== 'undefined' },
                { name: 'determineEnding', exists: typeof determineEnding !== 'undefined' }
            ];

            checks.forEach(check => {
                const status = check.exists ? '✅' : '❌';
                const className = check.exists ? 'success' : 'error';
                html += `<div class="result ${className}">${status} ${check.name}</div>`;
            });

            result.innerHTML = html;
        }

        // 测试剧情节点
        function testStoryNodes() {
            const result = document.getElementById('story-result');
            let html = '<div class="result success">剧情节点测试：</div>';

            const expectedNodes = ['hour_0', 'hour_8', 'hour_16', 'hour_24', 'hour_36', 'hour_48'];

            expectedNodes.forEach(nodeId => {
                const node = getNode(nodeId);
                if (node) {
                    html += `<div class="result success">✅ ${nodeId}: ${node.title} (${node.choices.length}个选择)</div>`;
                } else {
                    html += `<div class="result error">❌ ${nodeId}: 节点不存在</div>`;
                }
            });

            result.innerHTML = html;
        }

        // 测试结局
        function testEnding(endingId) {
            const result = document.getElementById('ending-result');
            const ending = getEnding(endingId);

            if (ending) {
                let html = `<div class="result success">
                    <h3>${ending.title}</h3>
                    <p>触发概率: ${ending.percentage}%</p>
                    <p>分享文案: ${ending.shareText}</p>
                    <pre>${ending.description.join('\n')}</pre>
                </div>`;
                result.innerHTML = html;
            } else {
                result.innerHTML = `<div class="result error">❌ 结局 ${endingId} 不存在</div>`;
            }
        }

        // 测试资源系统
        function testResources() {
            const result = document.getElementById('resource-result');
            const rm = new ResourceManager();

            let html = '<div class="result success">资源系统测试：</div>';

            // 测试初始状态
            html += `<div class="result">初始状态: 💰${rm.money} ⏰${rm.time}h ⚡${rm.energy} 👥${rm.network}</div>`;

            // 测试消耗
            rm.consume({ money: 1000, time: 4, energy: 20, network: 1 });
            html += `<div class="result">消耗后: 💰${rm.money} ⏰${rm.time}h ⚡${rm.energy} 👥${rm.network}</div>`;

            // 测试获得
            rm.gain({ money: 500, energy: 10 });
            html += `<div class="result">获得后: 💰${rm.money} ⏰${rm.time}h ⚡${rm.energy} 👥${rm.network}</div>`;

            // 测试游戏结束判定
            rm.money = 0;
            const gameOver = rm.checkGameOver();
            html += `<div class="result ${gameOver ? 'error' : 'success'}">游戏结束判定: ${gameOver || '继续游戏'}</div>`;

            result.innerHTML = html;
        }

        // 显示统计
        function showStatistics() {
            const result = document.getElementById('stats-result');
            const results = JSON.parse(localStorage.getItem('gameResults') || '[]');

            if (results.length === 0) {
                result.innerHTML = '<div class="result">暂无游戏数据</div>';
                return;
            }

            // 统计结局分布
            const distribution = {};
            results.forEach(r => {
                distribution[r.endingId] = (distribution[r.endingId] || 0) + 1;
            });

            // 计算平均存活时间
            const avgTime = results.reduce((sum, r) => sum + r.survivalTime, 0) / results.length;

            let html = `<div class="result success">
                <h3>游戏统计</h3>
                <p>总游戏次数: ${results.length}</p>
                <p>平均存活时间: ${avgTime.toFixed(1)}小时</p>
                <h4>结局分布:</h4>
                <pre>${JSON.stringify(distribution, null, 2)}</pre>
            </div>`;

            result.innerHTML = html;
        }

        // 清除数据
        function clearData() {
            if (confirm('确定要清除所有游戏数据吗？')) {
                localStorage.removeItem('gameResults');
                localStorage.removeItem('latestResult');
                alert('数据已清除');
                showStatistics();
            }
        }

        // 快速通关
        function quickPlay(targetEnding) {
            const result = document.getElementById('quickplay-result');
            const rm = new ResourceManager();

            // 模拟不同的游戏路径
            if (targetEnding === 'broke') {
                rm.money = 0;
                rm.hour = 24;
            } else if (targetEnding === 'success') {
                rm.money = 6000;
                rm.hour = 48;
                rm.addFlag('has_customer');
                rm.addFlag('paid_rent');
            } else if (targetEnding === 'no_ethics') {
                rm.money = 5000;
                rm.hour = 48;
                rm.addFlag('broke_rules');
                rm.addFlag('has_customer');
            }

            const ending = determineEnding(rm);

            let html = `<div class="result ${ending.id === targetEnding ? 'success' : 'error'}">
                <h3>目标结局: ${targetEnding}</h3>
                <h3>实际结局: ${ending.id} - ${ending.title}</h3>
                <p>存活时间: ${rm.hour}小时</p>
                <p>最终资源: 💰${rm.money} ⏰${rm.time}h ⚡${rm.energy} 👥${rm.network}</p>
                <p>标记: ${rm.flags.join(', ') || '无'}</p>
            </div>`;

            result.innerHTML = html;
        }

        // 页面加载时自动检查
        window.onload = function() {
            checkFiles();
        };
    </script>
</body>
</html>
