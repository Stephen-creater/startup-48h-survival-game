<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创业者48小时生存实验</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/glitch.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <!-- 开场动画 -->
    <div id="intro" class="screen active">
        <div class="typewriter-container">
            <p class="typewriter" id="intro-text"></p>
        </div>
        <button id="start-btn" class="cta-btn hidden">开始实验</button>
    </div>

    <!-- 游戏主界面 -->
    <div id="game" class="screen">
        <!-- 资源条 -->
        <div class="resources">
            <div class="resource-item">
                <span class="resource-label">💰 金钱</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="money-bar"></div>
                </div>
                <span class="resource-value" id="money-value">¥8000</span>
            </div>
            <div class="resource-item">
                <span class="resource-label">⏰ 时间</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="time-bar"></div>
                </div>
                <span class="resource-value" id="time-value">48h</span>
            </div>
            <div class="resource-item">
                <span class="resource-label">⚡ 精力</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="energy-bar"></div>
                </div>
                <span class="resource-value" id="energy-value">100</span>
            </div>
            <div class="resource-item">
                <span class="resource-label">👥 人脉</span>
                <div class="resource-bar">
                    <div class="resource-fill" id="network-bar"></div>
                </div>
                <span class="resource-value" id="network-value">5</span>
            </div>
        </div>

        <!-- 当前时间 -->
        <div class="current-hour">
            <span class="glitch" id="hour-display">第 0 小时</span>
        </div>

        <!-- 剧情内容 -->
        <div class="story-content">
            <h2 id="story-title"></h2>
            <p class="scene-desc" id="story-scene"></p>
            <p class="story-text" id="story-description"></p>
            <p class="black-mirror-text" id="story-consequence"></p>
        </div>

        <!-- 选择按钮 -->
        <div class="choices" id="choices-container"></div>
    </div>

    <!-- 结局界面 -->
    <div id="ending" class="screen">
        <div class="ending-content">
            <h1 class="glitch" id="ending-title"></h1>
            <p class="ending-stats" id="ending-stats"></p>
            <p class="ending-text" id="ending-description"></p>
            <div class="ending-actions">
                <button class="cta-btn" id="share-btn">分享结果</button>
                <button class="cta-btn secondary" id="restart-btn">重新开始</button>
            </div>
        </div>
    </div>

    <!-- 分享卡片（隐藏） -->
    <div id="share-card" class="hidden">
        <div class="share-content">
            <h2>我的创业实验结果</h2>
            <p id="share-ending"></p>
            <p id="share-stats"></p>
            <p class="share-cta">你能活多久？</p>
        </div>
    </div>

    <script src="js/resources.js"></script>
    <script src="js/story.js"></script>
    <script src="js/endings.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
